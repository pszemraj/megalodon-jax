name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  fast-correctness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.11"
            jax: "0.8.2"
            equinox: "0.13.2"
          - python: "3.13"
            jax: "0.10.2"
            equinox: "0.13.8"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install endpoint
        run: >-
          python -m pip install -e ".[dev]"
          "jax==${{ matrix.jax }}"
          "equinox==${{ matrix.equinox }}"
      - run: pytest -m fast
