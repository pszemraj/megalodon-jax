name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install ruff
      - name: Run lint
        run: ruff check .
      - name: Check preview formatting
        run: ruff format --preview --check .

  fast-correctness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.11"
            jax: "0.10.2"
            equinox: "0.13.8"
          - python: "3.13"
            jax: "0.10.2"
            equinox: "0.13.8"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install test environment
        run: >-
          python -m pip install -e ".[dev]"
          "jax==${{ matrix.jax }}"
          "equinox==${{ matrix.equinox }}"
      - name: Run fast correctness gate
        run: pytest -m fast
