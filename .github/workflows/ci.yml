name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install ruff
      - name: Run lint
        run: ruff check .
      - name: Check preview formatting
        run: ruff format --preview --check .

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install packaging tools
        run: python -m pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check --strict dist/*
      - name: Validate wheel runtime profiles
        run: |
          python - <<'PY'
          from email.parser import BytesParser
          from pathlib import Path
          from zipfile import ZipFile

          from packaging.requirements import Requirement
          from packaging.utils import canonicalize_name

          wheels = list(Path("dist").glob("*.whl"))
          sdists = list(Path("dist").glob("*.tar.gz"))
          assert len(wheels) == 1, wheels
          assert len(sdists) == 1, sdists

          wheel = wheels[0]
          assert wheel.name.endswith("-py3-none-any.whl"), wheel.name
          with ZipFile(wheel) as archive:
              metadata_path = next(
                  name for name in archive.namelist() if name.endswith(".dist-info/METADATA")
              )
              wheel_path = next(
                  name for name in archive.namelist() if name.endswith(".dist-info/WHEEL")
              )
              metadata = BytesParser().parsebytes(archive.read(metadata_path))
              wheel_metadata = archive.read(wheel_path).decode()

          assert metadata["Name"] == "megalodon-jax"
          assert "Root-Is-Purelib: true" in wheel_metadata
          assert "Tag: py3-none-any" in wheel_metadata

          requirements = [Requirement(value) for value in metadata.get_all("Requires-Dist", [])]
          jax_requirements = [
              requirement
              for requirement in requirements
              if canonicalize_name(requirement.name) == "jax"
          ]
          base = [requirement for requirement in jax_requirements if requirement.marker is None]
          cuda13 = [
              requirement
              for requirement in jax_requirements
              if requirement.extras == {"cuda13"}
              and requirement.marker is not None
              and requirement.marker.evaluate({"extra": "cuda13"})
          ]
          assert len(base) == 1, jax_requirements
          assert len(cuda13) == 1, jax_requirements
          assert str(base[0].specifier) == "<0.11,>=0.10.2"
          assert str(cuda13[0].specifier) == "<0.11,>=0.10.2"
          assert "cuda13" in metadata.get_all("Provides-Extra", [])
          assert all(
              "cuda12" not in str(requirement).lower()
              and "cuda13-local" not in str(requirement).lower()
              for requirement in jax_requirements
          )
          PY
      - name: Install and smoke-test the default CPU profile
        run: |
          python -m pip install dist/*.whl
          cd /tmp
          JAX_PLATFORMS=cpu python - <<'PY'
          import importlib.metadata

          import jax
          import jax.numpy as jnp
          import megalodon_jax

          assert importlib.metadata.version("megalodon-jax")
          assert megalodon_jax.__file__ is not None
          assert jax.default_backend() == "cpu"
          result = (jnp.ones((2, 2)) @ jnp.ones((2, 2))).block_until_ready()
          assert result.tolist() == [[2.0, 2.0], [2.0, 2.0]]
          PY

  fast-correctness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.11"
            jax: "0.10.2"
            equinox: "0.13.8"
          - python: "3.13"
            jax: "0.10.2"
            equinox: "0.13.8"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install test environment
        run: >-
          python -m pip install -e ".[dev]"
          "jax==${{ matrix.jax }}"
          "equinox==${{ matrix.equinox }}"
      - name: Run fast correctness gate
        run: pytest -m fast
